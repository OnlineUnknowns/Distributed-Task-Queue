version: "3.9"

networks:
  taskq-net:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: taskq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskq
      POSTGRES_PASSWORD: taskq_secret
      POSTGRES_DB: taskqueue
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d   # auto-run migrations on first boot
    ports:
      - "5432:5432"
    networks:
      - taskq-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskq -d taskqueue"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: taskq-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    networks:
      - taskq-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ─── API Server ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: taskq-api
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: taskq
      DB_PASSWORD: taskq_secret
      DB_NAME: taskqueue
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      API_PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - taskq-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Worker ────────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: taskq-worker
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: taskq
      DB_PASSWORD: taskq_secret
      DB_NAME: taskqueue
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      WORKER_COUNT: 5
      MAX_ATTEMPTS: 3
    networks:
      - taskq-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: taskq-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"
    networks:
      - taskq-net

  # ─── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: taskq-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana_dashboard.json:/var/lib/grafana/dashboards/task_queue.json:ro
      - ./monitoring/grafana_provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - taskq-net
    depends_on:
      - prometheus
